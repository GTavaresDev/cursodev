name: Linting

on: pull_request

permissions:
  pull-requests: read
  contents: read

jobs:
  lint:
    name: Prettier
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Install dependencies
        run: npm ci
      - name: Check code formatting
        run: npm run lint:prettier:check
  eslint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint:eslint:check
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Install dependencies
        run: npm ci
      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
